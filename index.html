<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orionOS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
        .anim-spin { animation: spin 8s linear infinite; }
        .anim-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-[#030712] m-0 p-0 select-none overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // Pure inline SVGs to avoid CDN dependency issues
        const DiscIcon = () => (
            <svg class="w-3.5 h-3.5 text-cyan-400 anim-spin" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
        );
        const CpuIcon = () => (
            <svg class="w-6 h-6 text-cyan-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3"/></svg>
        );
        const DataIcon = () => (
            <svg class="w-6 h-6 text-indigo-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>
        );
        const NodesIcon = () => (
            <svg class="w-6 h-6 text-emerald-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-10 5 10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
        );
        const FolderIcon = () => (
            <svg class="w-6 h-6 text-amber-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        );
        const TerminalIcon = () => (
            <svg class="w-3.5 h-3.5 text-cyan-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></svg>
        );
        const ActivityIcon = ({ className }) => (
            <svg class={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        );
        const CloseIcon = () => (
            <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        );
        const MaxIcon = () => (
            <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        );
        const MinIcon = () => (
            <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7"/></svg>
        );
        const ConfigIcon = () => (
            <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        );

        function OrionOS() {
            const [time, setTime] = React.useState('');
            const [activeWindow, setActiveWindow] = React.useState('core');
            const [isMaximized, setIsMaximized] = React.useState(false);
            const [logs, setLogs] = React.useState(['[orionOS] Kernel loaded.', '[orionOS] UI sandbox running environment nominal.']);

            React.useEffect(() => {
                const updateTime = () => {
                    const now = new Date();
                    setTime(now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }));
                };
                updateTime();
                const interval = setInterval(updateTime, 1000);
                return () => clearInterval(interval);
            }, []);

            const addLog = (msg) => {
                setLogs((prev) => [...prev.slice(-4), `[orionOS_user]: ${msg}`]);
            };

            const desktopIcons = [
                { id: 'core', label: 'System_Core', icon: CpuIcon },
                { id: 'database', label: 'Data_Vault', icon: DataIcon },
                { id: 'nodes', label: 'Network_Nodes', icon: NodesIcon },
                { id: 'fs', label: 'File_System', icon: FolderIcon },
            ];

            return (
                <div class="relative w-full h-screen text-slate-100 font-mono select-none antialiased bg-[#030712]">
                    {/* BACKGROUND AMBIENT GLOWS */}
                    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
                        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-cyan-500/10 rounded-full blur-[120px]" />
                        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-indigo-500/10 rounded-full blur-[150px]" />
                    </div>

                    {/* TOP TASK PANEL */}
                    <header class="absolute top-0 left-0 right-0 h-9 z-50 flex items-center justify-between px-4 bg-slate-950/60 border-b border-slate-800/50 backdrop-blur-md text-[11px] tracking-wider text-slate-400">
                        <div class="flex items-center gap-4">
                            <div class="flex items-center gap-1.5 font-bold text-slate-200">
                                <DiscIcon />
                                <span class="tracking-widest">orionOS</span>
                            </div>
                            <span class="text-slate-600">|</span>
                            <div class="flex items-center gap-2 text-slate-400">
                                <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 anim-pulse" />
                                <span>KERNEL: NOMINAL</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="hidden sm:flex items-center gap-3 text-slate-500">
                                <span>CPU: 09%</span>
                                <span>MEM: 2.1GB</span>
                            </div>
                            <span class="text-slate-600">|</span>
                            <span class="text-cyan-400 font-bold tracking-widest">{time}</span>
                        </div>
                    </header>

                    {/* OPERATING DESKTOP SPACE */}
                    <main class="relative z-10 w-full h-full pt-14 pb-6 px-6 flex">
                        <div class="flex flex-col gap-6 z-20">
                            {desktopIcons.map((icon) => {
                                const IconComponent = icon.icon;
                                const isRunning = activeWindow === icon.id;
                                return (
                                    <button key={icon.id} onClick={() => { setActiveWindow(icon.id); addLog(`Redirecting pointer to ${icon.label}.sys`); }} class="group flex flex-col items-center justify-center w-20 h-20 rounded-xl border border-transparent hover:border-slate-800/60 hover:bg-slate-900/30 transition-all duration-200 cursor-pointer">
                                        <div class="relative p-3 rounded-lg bg-slate-900/50 border border-slate-800/40 group-hover:scale-105 transition-transform shadow-lg">
                                            <IconComponent />
                                            {isRunning && <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-3 h-0.5 bg-cyan-400 rounded-full shadow-[0_0_8px_#22d3ee]" />}
                                        </div>
                                        <span class="text-[10px] mt-2 text-slate-400 group-hover:text-slate-200 text-center font-medium truncate w-full px-1">{icon.label}</span>
                                    </button>
                                );
                            })}
                        </div>

                        {/* DESKTOP WINDOW SYSTEM */}
                        {activeWindow && (
                            <div class={`absolute transition-all duration-300 ease-out z-30 bg-slate-950/70 border border-slate-800/80 backdrop-blur-xl rounded-xl shadow-[0_25px_70px_rgba(0,0,0,0.9)] flex flex-col overflow-hidden ${isMaximized ? 'top-14 left-6 right-6 bottom-6' : 'top-20 left-32 right-6 bottom-16 md:right-12 md:bottom-20'}`}>
                                <div class="h-10 bg-slate-900/80 border-b border-slate-800/60 flex items-center justify-between px-4">
                                    <div class="flex items-center gap-2 text-xs font-bold text-slate-300">
                                        <TerminalIcon />
                                        <span class="uppercase tracking-wider">orionOS://{activeWindow}</span>
                                    </div>
                                    <div class="flex items-center gap-2 text-slate-400">
                                        <button onClick={() => setIsMaximized(!isMaximized)} class="p-1 rounded hover:bg-slate-800 hover:text-slate-200 cursor-pointer">
                                            {isMaximized ? <MinIcon /> : <MaxIcon />}
                                        </button>
                                        <button onClick={() => { setActiveWindow(null); addLog('Terminated application task instance.'); }} class="p-1 rounded hover:bg-rose-950/60 hover:text-rose-400 cursor-pointer">
                                            <CloseIcon />
                                        </button>
                                    </div>
                                </div>

                                <div class="flex-1 p-6 overflow-y-auto space-y-6">
                                    {activeWindow === 'core' ? (
                                        <div class="space-y-6 max-w-4xl">
                                            <div class="p-6 rounded-lg bg-slate-900/40 border border-slate-800/40 space-y-3">
                                                <h4 class="text-xs text-cyan-400 font-bold tracking-widest uppercase">System Initialization Data</h4>
                                                <p class="text-xs text-slate-400 leading-relaxed">Welcome to orionOS. The deployment architecture successfully establishes modular layout bindings over compiled standard DOM components.</p>
                                            </div>
                                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                                <div class="p-4 rounded-lg bg-slate-900/40 border border-slate-800/40">
                                                    <div class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Threading Engine</div>
                                                    <div class="text-sm font-semibold text-slate-200 mt-1">Reactive Loop</div>
                                                </div>
                                                <div class="p-4 rounded-lg bg-slate-900/40 border border-slate-800/40">
                                                    <div class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Sandbox Node</div>
                                                    <div class="text-sm font-semibold text-emerald-400 mt-1">Active Client</div>
                                                </div>
                                                <div class="p-4 rounded-lg bg-slate-900/40 border border-slate-800/40">
                                                    <div class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Interface Deck</div>
                                                    <div class="text-sm font-semibold text-slate-200 mt-1">v1.0.0-Vanilla</div>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div class="h-full flex flex-col items-center justify-center text-center opacity-80 pt-12">
                                            <ActivityIcon className="w-8 h-8 text-cyan-400 anim-pulse mb-3" />
                                            <h3 class="text-sm font-bold text-slate-200 uppercase tracking-widest">{activeWindow} deployment initialized</h3>
                                            <p class="text-xs text-slate-500 mt-1">Active thread routing working securely inside the main workspace viewport.</p>
                                        </div>
                                    )}
                                </div>

                                <div class="h-7 bg-slate-950 border-t border-slate-900/60 px-4 flex items-center justify-between text-[10px] text-slate-500">
                                    <span class="truncate max-w-md text-slate-400">{logs[logs.length - 1]}</span>
                                    <span class="text-cyan-500/70">orion_shell_terminal</span>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* LOWER SYSTEM DASH-DOCK */}
                    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 z-40">
                        <div class="h-10 px-4 rounded-full bg-slate-950/80 border border-slate-800/60 backdrop-blur-lg flex items-center gap-6 shadow-xl text-xs">
                            <button onClick={() => addLog('Flushed diagnostic stack trace panels.')} class="text-slate-400 hover:text-cyan-400 flex items-center gap-1.5 cursor-pointer">
                                <ActivityIcon className="w-3.5 h-3.5" /> Diagnostics
                            </button>
                            <span class="text-slate-800">|</span>
                            <button onClick={() => addLog('Environment state profiles updated.')} class="text-slate-400 hover:text-amber-400 flex items-center gap-1.5 cursor-pointer">
                                <ConfigIcon /> Controls
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<OrionOS />);
    </script>
</body>
</html>
